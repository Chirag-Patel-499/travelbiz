{% extends "user_admin/base_dashboard.html" %}

{% block dashboard_content %}

<div class="card shadow border-0">

    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">

        <div>

            <h3 class="mb-1">
                <i class="bi bi-images"></i>
                Hotel Images
            </h3>

            <small>
                Upload and manage hotel gallery images
            </small>

        </div>

        <a href="{% url 'hotel_list' %}" class="btn btn-light">

            <i class="bi bi-arrow-left"></i>

            Back to Hotels

        </a>

    </div>

    <div class="card-body">

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="row">

                <!-- Hotel Selection -->

                <div class="col-md-6 mb-4">

                    <label class="form-label fw-bold">

                        Select Hotel

                    </label>

                    <select class="form-select">

                        <option>

                            -------- Select Hotel --------

                        </option>

                        {% for hotel in hotels %}

                        <option value="{{ hotel.id }}">

                            {{ hotel.hotel_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Upload -->

                <div class="col-md-6 mb-4">

                    <label class="form-label fw-bold">

                        Upload Images

                    </label>

                    <input type="file"
                           class="form-control"
                           multiple>

                </div>

            </div>

            <div class="text-end">

                <button class="btn btn-primary">

                    <i class="bi bi-cloud-upload"></i>

                    Upload Images

                </button>

            </div>

        </form>

        <hr class="my-4">

        <h4 class="mb-4">

            <i class="bi bi-card-image"></i>

            Uploaded Images

        </h4>

        <div class="row">

            <!-- Demo Card -->

            <div class="col-lg-3 col-md-4 col-sm-6 mb-4">

                <div class="card shadow-sm border-0">

                    <img src="https://placehold.co/400x250?text=Hotel+Image"
                         class="card-img-top"
                         alt="Hotel Image">

                    <div class="card-body text-center">

                        <h6 class="mb-3">

                            Sample Hotel

                        </h6>

                        <div class="btn-group">

                            <button class="btn btn-sm btn-outline-primary">

                                <i class="bi bi-eye"></i>

                            </button>

                            <button class="btn btn-sm btn-outline-danger">

                                <i class="bi bi-trash"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Empty State -->

            <div class="col-12">

                <div class="text-center py-5">

                    <i class="bi bi-images display-3 text-secondary"></i>

                    <h4 class="mt-3">

                        No Images Uploaded Yet

                    </h4>

                    <p class="text-muted">

                        Select a hotel and upload gallery images.

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
