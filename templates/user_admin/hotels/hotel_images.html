{% extends "user_admin/base_dashboard.html" %} {% block dashboard_content %}

<div class="card shadow border-0">
  <div
    class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3"
  >
    <div>
      <h3 class="mb-1">
        <i class="bi bi-images"></i>
        Hotel Images
      </h3>

      <small> Upload and manage hotel gallery images </small>
    </div>

    <a href="{% url 'hotel_list' %}" class="btn btn-light">
      <i class="bi bi-arrow-left"></i>

      Back to Hotels
    </a>
  </div>

  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row">
        <!-- Hotel Selection -->

        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold"> Select Hotel </label>

          <select class="form-select" name="hotel">
            <option value="">-------- Select Hotel --------</option>

            {% for hotel in hotels %}

            <option value="{{ hotel.id }}">{{ hotel.hotel_name }}</option>

            {% endfor %}
          </select>
        </div>

        <!-- Upload -->

        <div class="col-md-6 mb-4">
          <label class="form-label fw-bold"> Upload Images </label>

          <input type="file" name="image" class="form-control" multiple />
        </div>
      </div>

      <div class="text-end">
        <button class="btn btn-primary">
          <i class="bi bi-cloud-upload"></i>

          Upload Images
        </button>
      </div>
    </form>

    <hr class="my-4" />

    <h4 class="mb-4">
      <i class="bi bi-card-image"></i>

      Uploaded Images
    </h4>

    <div class="row">
      <!-- Demo Card -->

      <div class="row">
        {% for image in images %}

        <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
          <div class="card shadow-sm">
            <img
              src="{{ image.image.url }}"
              class="card-img-top"
              style="height: 220px; object-fit: cover"
            />

            <div class="card-body text-center">
              <h6>{{ image.hotel.hotel_name }}</h6>

              <div class="btn-group">
                <a
                  href="{{ image.image.url }}"
                  target="_blank"
                  class="btn btn-sm btn-outline-primary"
                >
                  <i class="bi bi-eye"></i>
                </a>

                <a
                  href="{% url 'hotel_image_delete' image.id %}"
                  class="btn btn-sm btn-outline-danger"
                  onclick="return confirm('Delete Image?');"
                >
                  <i class="bi bi-trash"></i>
                </a>
              </div>
            </div>
          </div>
        </div>

        {% empty %}

        <div class="col-12">
          <div class="alert alert-info">No Images Uploaded Yet.</div>
        </div>

        {% endfor %}
      </div>
    </div>
  </div>
</div>

{% endblock %}
