{% extends "user_admin/base_dashboard.html" %} {% block dashboard_content %}

<div class="card-box">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="mb-1">Edit Tour</h3>

      <p class="text-muted">Update your travel package</p>
    </div>

    <a href="{% url 'tour_list' %}" class="btn btn-secondary"> ← Back </a>
  </div>

  <form method="POST">
    {% csrf_token %}

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Tour Name</label>

        {{ form.tour_name }}
      </div>

      <div class="col-md-6 mb-3">
        <label>Location</label>

        {{ form.location }}
      </div>

      <div class="col-md-6 mb-3">
        <label>Duration</label>

        {{ form.duration }}
      </div>

      <div class="col-md-6 mb-3">
        <label>Price</label>

        {{ form.price }}
      </div>

      <div class="col-md-12 mb-3">
        <label>Description</label>

        {{ form.description }}
      </div>

      <div class="col-md-6 mb-4">
        <label>Status</label>

        {{ form.status }}
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Update Tour</button>
  </form>
</div>

{% endblock %}
