{% extends "user_admin/base_dashboard.html" %} {% block dashboard_content %}

<div class="card-box">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>{{ tour.tour_name }}</h3>

    <a href="{% url 'tour_list' %}" class="btn btn-secondary"> Back </a>
  </div>

  <table class="table">
    <tr>
      <th width="200">Tour Name</th>
      <td>{{ tour.tour_name }}</td>
    </tr>

    <tr>
      <th>Location</th>
      <td>{{ tour.location }}</td>
    </tr>

    <tr>
      <th>Duration</th>
      <td>{{ tour.duration }}</td>
    </tr>

    <tr>
      <th>Price</th>
      <td>₹{{ tour.price }}</td>
    </tr>

    <tr>
      <th>Status</th>
      <td>{{ tour.status }}</td>
    </tr>

    <tr>
      <th>Description</th>
      <td>{{ tour.description }}</td>
    </tr>
  </table>
</div>

{% endblock %}
